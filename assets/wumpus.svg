<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Main body - rounded rectangle -->
  <ellipse cx="100" cy="120" rx="70" ry="80" fill="#5EC962" stroke="#3d8b3d" stroke-width="3"/>
  
  <!-- Head area -->
  <ellipse cx="100" cy="50" rx="60" ry="55" fill="#6fd36f" stroke="#3d8b3d" stroke-width="2"/>
  
  <!-- Large eye white -->
  <circle cx="100" cy="45" r="35" fill="#e8f5e9" stroke="#2d5a2d" stroke-width="2"/>
  
  <!-- Iris - dark teal/green -->
  <circle cx="100" cy="45" r="22" fill="#00897b"/>
  
  <!-- Pupil - black -->
  <circle cx="100" cy="45" r="14" fill="#000000"/>
  
  <!-- Eye shine/highlight -->
  <circle cx="108" cy="38" r="6" fill="#ffffff" opacity="0.9"/>
  
  <!-- Mouth -->
  <path d="M 75 70 Q 100 85 125 70" stroke="#2d5a2d" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth - top row -->
  <rect x="78" y="68" width="6" height="8" fill="#ffffff" rx="1"/>
  <rect x="87" y="70" width="6" height="10" fill="#ffffff" rx="1"/>
  <rect x="96" y="72" width="6" height="12" fill="#ffffff" rx="1"/>
  <rect x="105" y="72" width="6" height="12" fill="#ffffff" rx="1"/>
  <rect x="114" y="70" width="6" height="10" fill="#ffffff" rx="1"/>
  <rect x="123" y="68" width="6" height="8" fill="#ffffff" rx="1"/>
  
  <!-- Left ear/antenna -->
  <ellipse cx="55" cy="25" rx="18" ry="25" fill="#5ec962" stroke="#3d8b3d" stroke-width="2" transform="rotate(-35 55 25)"/>
  
  <!-- Right ear/antenna -->
  <ellipse cx="145" cy="25" rx="18" ry="25" fill="#5ec962" stroke="#3d8b3d" stroke-width="2" transform="rotate(35 145 25)"/>
  
  <!-- Left tentacle 1 -->
  <path d="M 50 100 Q 30 95 25 120" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="120" r="8" fill="#3d8b3d"/>
  
  <!-- Left tentacle 2 -->
  <path d="M 45 140 Q 20 140 10 160" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="10" cy="160" r="8" fill="#3d8b3d"/>
  
  <!-- Left tentacle 3 -->
  <path d="M 50 180 Q 30 195 25 220" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="220" r="8" fill="#3d8b3d"/>
  
  <!-- Right tentacle 1 -->
  <path d="M 150 100 Q 170 95 175 120" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="175" cy="120" r="8" fill="#3d8b3d"/>
  
  <!-- Right tentacle 2 -->
  <path d="M 155 140 Q 180 140 190 160" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="190" cy="160" r="8" fill="#3d8b3d"/>
  
  <!-- Right tentacle 3 -->
  <path d="M 150 180 Q 170 195 175 220" stroke="#5ec962" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="175" cy="220" r="8" fill="#3d8b3d"/>
</svg>