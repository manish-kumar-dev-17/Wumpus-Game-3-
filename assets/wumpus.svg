<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Wumpus Monster - Green with tentacles -->
  <!-- Main body -->
  <ellipse cx="32" cy="35" rx="20" ry="18" fill="#6BBF59" stroke="#4A8C3D" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="32" cy="18" r="12" fill="#7FCD6D" stroke="#4A8C3D" stroke-width="2"/>
  
  <!-- Large eye -->
  <circle cx="32" cy="18" r="7" fill="#E8F5E9" stroke="#4A8C3D" stroke-width="1.5"/>
  <circle cx="32" cy="18" r="5" fill="#00695C"/>
  <circle cx="33" cy="17" r="2.5" fill="#FFFFFF"/>
  
  <!-- Mouth - smile -->
  <path d="M 26 22 Q 32 25 38 22" fill="none" stroke="#2D5A2D" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Teeth -->
  <line x1="28" y1="23" x2="28" y2="25" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  <line x1="32" y1="24" x2="32" y2="26" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="23" x2="36" y2="25" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Left tentacles -->
  <path d="M 16 32 Q 12 30 10 35" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  <path d="M 16 38 Q 8 38 6 43" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  <path d="M 16 44 Q 10 48 8 52" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right tentacles -->
  <path d="M 48 32 Q 52 30 54 35" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 38 Q 56 38 58 43" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 44 Q 54 48 56 52" fill="none" stroke="#6BBF59" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Tentacle suckers -->
  <circle cx="10" cy="35" r="2" fill="#4A8C3D"/>
  <circle cx="6" cy="43" r="2" fill="#4A8C3D"/>
  <circle cx="8" cy="52" r="2" fill="#4A8C3D"/>
  <circle cx="54" cy="35" r="2" fill="#4A8C3D"/>
  <circle cx="58" cy="43" r="2" fill="#4A8C3D"/>
  <circle cx="56" cy="52" r="2" fill="#4A8C3D"/>
</svg>