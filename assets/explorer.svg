<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Agent Robot -->
  <!-- Head/Screen -->
  <rect x="20" y="12" width="24" height="20" rx="4" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="2"/>
  
  <!-- Eyes/Screen display -->
  <circle cx="26" cy="20" r="3.5" fill="#333333" stroke="#1A8B7F" stroke-width="1"/>
  <circle cx="38" cy="20" r="3.5" fill="#333333" stroke="#1A8B7F" stroke-width="1"/>
  
  <!-- Display line -->
  <rect x="24" y="26" width="16" height="3" rx="1" fill="#333333"/>
  
  <!-- Body -->
  <rect x="18" y="32" width="28" height="16" rx="3" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="2"/>
  
  <!-- Buttons -->
  <rect x="26" y="38" width="3" height="3" fill="#1A8B7F"/>
  <rect x="35" y="38" width="3" height="3" fill="#1A8B7F"/>
  
  <!-- Left arm -->
  <g>
    <rect x="8" y="38" width="10" height="5" rx="2" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
    <circle cx="6" cy="41" r="3" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
  </g>
  
  <!-- Right arm -->
  <g>
    <rect x="46" y="38" width="10" height="5" rx="2" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
    <circle cx="58" cy="41" r="3" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
  </g>
  
  <!-- Legs -->
  <rect x="24" y="48" width="4" height="12" rx="2" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
  <rect x="36" y="48" width="4" height="12" rx="2" fill="#4ECDC4" stroke="#1A8B7F" stroke-width="1.5"/>
  
  <!-- Feet -->
  <circle cx="26" cy="62" r="2.5" fill="#1A8B7F"/>
  <circle cx="38" cy="62" r="2.5" fill="#1A8B7F"/>
</svg>