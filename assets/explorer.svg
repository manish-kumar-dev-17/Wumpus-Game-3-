<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="32" cy="20" r="10" fill="#f4a460" stroke="#d2691e" stroke-width="1.5"/>
  
  <!-- Hat -->
  <ellipse cx="32" cy="12" rx="12" ry="4" fill="#333"/>
  <path d="M 24 12 Q 20 15 22 18" fill="#333"/>
  <polygon points="32,8 30,12 34,12" fill="#666"/>
  
  <!-- Body -->
  <rect x="24" y="30" width="16" height="18" rx="2" fill="#4169e1" stroke="#1e3a5f" stroke-width="1.5"/>
  
  <!-- Arms -->
  <g stroke="#f4a460" stroke-width="2.5" stroke-linecap="round">
    <line x1="24" y1="35" x2="14" y2="32"/>
    <line x1="40" y1="35" x2="50" y2="32"/>
  </g>
  
  <!-- Legs -->
  <g stroke="#333" stroke-width="2.5" stroke-linecap="round">
    <line x1="27" y1="48" x2="26" y2="58"/>
    <line x1="37" y1="48" x2="38" y2="58"/>
  </g>
  
  <!-- Eyes -->
  <circle cx="29" cy="18" r="1.5" fill="#000"/>
  <circle cx="35" cy="18" r="1.5" fill="#000"/>
  
  <!-- Smile -->
  <path d="M 30 22 Q 32 23 34 22" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round"/>
</svg>